services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: transport_mvp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    restart: unless-stopped

volumes:
  pgdata:
